<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Credit AI Model</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="landing-nav" style="backdrop-filter: blur(var(--blur-strength)); background: rgba(255,255,255,0.85);">
        <a href="index.html" class="brand-logo">CredAi</a>
        <ul class="nav-links">
            <li><a href="assessment.html">Product</a></li>
            <li><a href="capabilities.html">Technology</a></li>
            <li><a href="about.html">About</a></li>
            <li id="nav-dashboard" class="hidden"><a href="dashboard.html">Dashboard</a></li>
        </ul>
        <div class="nav-actions">
            <a href="login.html" id="nav-signin" class="btn-signin" style="color: var(--text-secondary);">Sign In</a>
            <a href="#" id="nav-signout" class="btn-signin hidden">Sign Out</a>
            <a href="assessment.html" class="btn-start" style="border-radius: var(--radius-sm);">Start Demo</a>
        </div>
    </nav>

    <main class="container main-content">
        <div class="intro-section reveal">
            <h2>Get in Touch</h2>
            <p>Interested in deploying our Credit Decision Engine? Contact our risk committee.</p>
        </div>

        <section class="form-panel reveal delay-100" style="max-width: 600px; margin: 0 auto;">
            <div class="panel-header">
                <h3>Contact Form</h3>
            </div>
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Send Message</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Credit AI Model. Inspired by QCIF.</p>
        </div>
    </footer>
</body>

</html>
